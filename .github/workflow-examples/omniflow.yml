name: OmniFlow

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  omniflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install OmniFlow
        run: python -m pip install "omniflow==0.4.0"

      - name: Run OmniFlow
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          OMNI_API_KEY: ${{ secrets.OMNI_API_KEY }}
        run: omniflow run --auto --config .omniflow.yml

      - name: Skip unsafe fork PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          mkdir -p .omniflow
          printf '{"policy_decision":"skipped","reason":"Fork pull request cannot access OMNI_API_KEY safely."}\n' > .omniflow/report.json

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: omniflow-evidence
          path: .omniflow/
          if-no-files-found: ignore

      - name: Upload SARIF
        if: always() && hashFiles('.omniflow/report.sarif') != ''
        uses: github/codeql-action/upload-sarif@dc73d59c2d7bd4f8194098a91219eeee6d8a1719
        with:
          sarif_file: .omniflow/report.sarif

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('.omniflow/report.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER='<!-- omniflow-report -->'
          BODY="$(printf '%s\n\n' "$MARKER"; cat .omniflow/report.md)"
          EXISTING="$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[] | select(.body | contains("<!-- omniflow-report -->")) | .id' | head -n 1)"
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING}" -f body="$BODY" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
