contracts:
  enabled: true
  fail_on:
    deleted_referenced_fields: true
    renamed_referenced_fields: true
    referenced_field_type_changes: true
    referenced_join_cardinality_changes: true

checks:
  content_validation:
    enabled: true
    fail_on_new_only: true
    labels:
      - Verified
      - Executive

  model_validation:
    enabled: true
    fail_on_warnings: false

  semantic_lint:
    enabled: true
    rules:
      require_field_descriptions: warn
      require_primary_keys: error
      block_deleted_fields: error
      warn_join_cardinality_change: warn
      require_topic_labels: warn

reporting:
  formats:
    - json
    - markdown
    - sarif
    - junit
  output_dir: .omniflow

security:
  redact_logs: true
  allow_raw_response_output: false
  max_report_samples: 20
  redact_document_names: false
